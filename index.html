<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система управления картой</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 20px; display: flex; gap: 20px; }
        
        .sidebar { width: 280px; background: #2d2d2d; padding: 20px; border-radius: 8px; border: 1px solid #444; height: fit-content; }
        .sidebar h2 { font-size: 18px; margin-top: 0; text-align: center; }
        
        .main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; }
        .controls-wrapper { display: flex; gap: 20px; margin-bottom: 20px; }
        
        button { padding: 10px 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; display: flex; align-items: center; gap: 5px; }
        .btn-inf { background: #4CAF50; color: white; }
        .btn-tank { background: #d32f2f; color: white; }
        .btn-air { background: #FFC107; color: black; }
        .btn-hex { background: #5d4037; color: white; margin-bottom: 10px; width: 100%; justify-content: center; }
        
        #map-container { position: relative; width: 1000px; height: 600px; background: #252525; border: 1px solid #444; overflow: hidden; border-radius: 4px; }
        
        .hex { position: absolute; width: 120px; height: 120px; background-size: cover; cursor: grab; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); z-index: 1; display: flex; align-items: center; justify-content: center; }
        .token { position: absolute; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: grab; border: 2px solid white; z-index: 2; }
        
        .delete-btn, .edit-btn { border-radius: 50%; width: 26px; height: 26px; font-size: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white; color: white; padding: 0; position: absolute; }
        .token .delete-btn { top: -8px; right: -8px; background: #ff3b30; }
        .token .edit-btn { top: 25px; right: -8px; background: #2196F3; }
        .hex .delete-btn { background: #ff3b30; display: none; z-index: 2; }
        .hex:hover .delete-btn { display: flex; }
        
        #card-popup { display: none; position: fixed; background: #e6c2b8; border: 2px solid #000; padding: 15px; z-index: 10000; border-radius: 2px; color: black; width: 200px; text-align: left; box-shadow: 5px 5px 10px rgba(0,0,0,0.5); }
        #popup-textarea { width: 100%; height: 100px; background: transparent; border: 1px solid #000; resize: none; font-family: Arial, sans-serif; white-space: pre-wrap; margin-top: 5px; }
        #save-btn { width: 100%; margin-top: 5px; padding: 5px; background: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
    <h2>Добавить гекс</h2>
    <button class="btn-hex" id="add-town"> 🏰  + Город</button>
    <button class="btn-hex" id="add-field"> 🌱  + Поле</button>
    <button class="btn-hex" id="add-forest"> 🌲  + Лес</button>
    <button class="btn-hex" id="add-bushes"> 🌿  + Кусты</button>
    <button class="btn-hex" id="add-village"> 🏠  + Деревня</button>
    <button class="btn-hex" id="add-farmland"> 🌾  + Пашня</button>
    <button class="btn-hex" id="add-port"> ⚓  + Морской Порт</button>
    <button class="btn-hex" id="add-sea"> 🌊  + Море</button>
</div>
    
    <div class="main-content">
        <h1>Система управления картой</h1>
        <div class="controls-wrapper">
            <button class="btn-inf" id="add-inf">🏃 + Пехота</button>
            <button class="btn-tank" id="add-tank">🚜 + Техника</button>
            <button class="btn-air" id="add-air">✈️ + Авиация</button>
        </div>
        <div id="map-container"></div>
    </div>
    
    <div id="card-popup">
        <div style="font-weight: bold; border-bottom: 1px solid #000; margin-bottom: 5px;">КАРТОЧКА</div>
        <textarea id="popup-textarea"></textarea>
        <button id="save-btn">💾 Сохранить</button>
    </div>
    
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onChildAdded, onChildChanged, onChildRemoved, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // ... (ваш конфиг Firebase остается прежним) ...
    const firebaseConfig = { /* Вставьте ваш конфиг */ };
    const db = getDatabase(initializeApp(firebaseConfig));
    const mapContainer = document.getElementById('map-container');
    // ... (остальные переменные) ...

    function renderElement(id, data, type) {
        const el = document.createElement('div');
        el.className = type === 'hex' ? 'hex' : `token token-${data.type ? data.type.toLowerCase() : 'default'}`;
        el.id = id;
        el.style.top = data.top + 'px'; 
        el.style.left = data.left + 'px';
        
        if (type === 'hex') {
            el.style.backgroundImage = `url('${hexImages[data.type]}')`;
            // Применяем начальный поворот
            el.style.transform = `rotate(${data.rotation || 0}deg)`;
            el.style.transition = "transform 0.1s linear";

            // ПРАВАЯ КНОПКА: Вращение по часовой (на 60°)
            el.oncontextmenu = (e) => {
                e.preventDefault();
                const current = data.rotation || 0;
                update(ref(db, 'hexes/' + id), { rotation: (current + 60) % 360 });
            };

            // ЛЕВАЯ КНОПКА (Двойной клик): Вращение против часовой (-60°)
            el.ondblclick = (e) => {
                e.preventDefault();
                const current = data.rotation || 0;
                // Добавляем 360 перед остатком, чтобы корректно обрабатывать отрицательные углы
                update(ref(db, 'hexes/' + id), { rotation: (current - 60 + 360) % 360 });
            };
        } else {
            el.innerText = tokenIcons[data.type];
        }

        // ... (код для кнопок удаления и перетаскивания сохраните без изменений) ...
        mapContainer.appendChild(el);
    }

    // Слушатель обновлений: теперь при изменении rotation гекс будет поворачиваться
    onChildChanged(ref(db, 'hexes'), (s) => { 
        const el = document.getElementById(s.key); 
        if(el) { 
            el.style.top = s.val().top + 'px'; 
            el.style.left = s.val().left + 'px'; 
            el.style.transform = `rotate(${s.val().rotation || 0}deg)`; 
        }
    });

    // ОБНОВЛЕНИЕ КНОПОК ДОБАВЛЕНИЯ: Добавьте , rotation: 0 в каждый вызов set
    document.getElementById('add-town').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'town', top: 150, left: 150, rotation: 0 });
    // ... (сделайте так же для всех остальных гексов: field, forest, bushes, village, farmland, port, sea)
    
    document.getElementById('add-town').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'town', top: 150, left: 150, rotation: 0 });
    document.getElementById('add-field').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'field', top: 150, left: 150, rotation: 0 });
    document.getElementById('add-forest').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'forest', top: 150, left: 150, rotation: 0 });
    document.getElementById('add-bushes').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'bushes', top: 150, left: 150, rotation: 0 });
    document.getElementById('add-village').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'village', top: 150, left: 150, rotation: 0 });
    document.getElementById('add-farmland').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'farmland', top: 150, left: 150, rotation: 0 });
    document.getElementById('add-port').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'port', top: 150, left: 150, rotation: 0 });
    document.getElementById('add-sea').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'sea', top: 150, left: 150, rotation: 0 });

    document.getElementById('add-inf').onclick = () => set(ref(db, 'tokens/' + Date.now()), { type: 'INF', top: 50, left: 50, info: "Пехота" });
    document.getElementById('add-tank').onclick = () => set(ref(db, 'tokens/' + Date.now()), { type: 'TNK', top: 50, left: 50, info: "Техника" });
    document.getElementById('add-air').onclick = () => set(ref(db, 'tokens/' + Date.now()), { type: 'AIR', top: 50, left: 50, info: "Авиация" });
</script>
</body>
</html>
