<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система управления картой</title>
    <style>
        body { font-family: Arial, sans-serif; background: #222; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .controls { margin: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        button { padding: 10px 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; }
        #map-container { position: relative; width: 1000px; height: 600px; background: #333; border: 2px solid #555; margin: 20px auto; overflow: hidden; border-radius: 10px; }
        .hex { position: absolute; width: 100px; height: 115.47px; background-size: cover; cursor: grab; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); z-index: 1; }
        .token { position: absolute; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: grab; border: 2px solid white; z-index: 2; }
        .delete-btn { position: absolute; top: -5px; right: -5px; background: #ff3b30; color: white; border-radius: 50%; width: 32px; height: 32px; font-size: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 9999; }
    </style>
</head>
<body>

    <h1>Система управления картой</h1>
    <div class="controls">
        <button id="add-town">🏰 Город</button>
        <button id="add-inf">🏃 Пехота</button>
        <button id="add-tank">🚜 Техника</button>
    </div>

    <div id="map-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onChildAdded, onChildChanged, onChildRemoved, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDwsFk9zwr-q1dxlVRrjyJNXNz9TJ0_LgA",
            authDomain: "rp-map-218d5.firebaseapp.com",
            databaseURL: "https://rp-map-218d5-default-rtdb.firebaseio.com",
            projectId: "rp-map-218d5",
            storageBucket: "rp-map-218d5.firebasestorage.app",
            messagingSenderId: "786305486724",
            appId: "1:786305486724:web:fbc318ab0864fa821897d1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const mapContainer = document.getElementById('map-container');

        function makeDraggable(el, path) {
            const savePos = (x, y) => update(ref(db, path), { top: y, left: x });

            // Мышь
            el.onmousedown = (e) => {
                if (e.target.className === 'delete-btn') return;
                let shiftX = e.clientX - el.getBoundingClientRect().left;
                let shiftY = e.clientY - el.getBoundingClientRect().top;
                document.onmousemove = (e) => {
                    let x = e.clientX - mapContainer.getBoundingClientRect().left - shiftX;
                    let y = e.clientY - mapContainer.getBoundingClientRect().top - shiftY;
                    el.style.left = x + 'px'; el.style.top = y + 'px';
                };
                document.onmouseup = () => { document.onmousemove = null; savePos(parseInt(el.style.left), parseInt(el.style.top)); };
            };

            // Телефон
            el.ontouchstart = (e) => {
                if (e.target.className === 'delete-btn') return;
                const touch = e.touches[0];
                let shiftX = touch.clientX - el.getBoundingClientRect().left;
                let shiftY = touch.clientY - el.getBoundingClientRect().top;
                const onTouchMove = (e) => {
                    const t = e.touches[0];
                    el.style.left = (t.clientX - mapContainer.getBoundingClientRect().left - shiftX) + 'px';
                    el.style.top = (t.clientY - mapContainer.getBoundingClientRect().top - shiftY) + 'px';
                };
                document.addEventListener('touchmove', onTouchMove, { passive: false });
                document.ontouchend = () => { document.removeEventListener('touchmove', onTouchMove); savePos(parseInt(el.style.left), parseInt(el.style.top)); };
            };
        }

        function renderElement(id, data, type) {
            const el = document.createElement('div');
            el.className = type === 'hex' ? 'hex' : 'token';
            el.id = id;
            el.style.top = data.top + 'px'; el.style.left = data.left + 'px';
            el.style.background = type === 'hex' ? 'brown' : 'green';
            
            const del = document.createElement('div');
            del.className = 'delete-btn'; del.innerText = 'X';
            del.onclick = (e) => { e.stopPropagation(); remove(ref(db, type + 's/' + id)); };
            el.appendChild(del);
            
            makeDraggable(el, type + 's/' + id);
            mapContainer.appendChild(el);
        }

        onChildAdded(ref(db, 'hexes'), (s) => renderElement(s.key, s.val(), 'hex'));
        onChildAdded(ref(db, 'tokens'), (s) => renderElement(s.key, s.val(), 'token'));
        onChildRemoved(ref(db, 'hexes'), (s) => document.getElementById(s.key)?.remove());
        onChildRemoved(ref(db, 'tokens'), (s) => document.getElementById(s.key)?.remove());

        document.getElementById('add-town').onclick = () => set(ref(db, 'hexes/' + Date.now()), { top: 150, left: 150 });
        document.getElementById('add-inf').onclick = () => set(ref(db, 'tokens/' + Date.now()), { top: 50, left: 50 });
        document.getElementById('add-tank').onclick = () => set(ref(db, 'tokens/' + Date.now()), { top: 50, left: 100 });
    </script>
</body>
</html>
