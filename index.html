<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мультиплеерный Штаб RP — Гексы</title>
    <style>
        body { font-family: Arial, sans-serif; background: #222; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .controls { margin: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; align-items: center; }
        
        button { padding: 10px 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; display: flex; align-items: center; gap: 5px; }
        .btn-inf { background: #4CAF50; color: white; }
        .btn-tank { background: #d32f2f; color: white; }
        .btn-air { background: #FFC107; color: black; }
        
        .btn-hex { background: #795548; color: white; }
        
        #map-container {
            position: relative;
            width: 1200px;
            height: 700px;
            background: #2a2a2a;
            margin: 0 auto;
            border: 4px solid #444;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        /* Стили гексов */
        .hex {
            position: absolute;
            width: 120px;
            height: 138px;
            background-size: cover;
            background-position: center;
            cursor: move;
            user-select: none;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            z-index: 1;
        }

        /* Обновленные стили фишек с фиксом цвета */
        .token {
            position: absolute;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: move;
            user-select: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
            border: 2px solid #fff;
            z-index: 10;
        }
        .token-inf { background: #2e7d32 !important; }
        .token-tnk { background: #d32f2f !important; } /* Исправлен регистр для корректного отображения */
        .token-air { background: #f9a825 !important; }

        .delete-btn {
            position: absolute;
            top: -2px;
            right: -2px;
            background: red;
            color: white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid white;
            z-index: 100;
        }
    </style>
</head>
<body>

    <h1>Мультиплеерный Штаб RP</h1>
    
    <div class="controls">
        <!-- Кнопки ландшафта -->
        <button class="btn-hex" id="add-town">🏰 + Гекс Город</button>
        <button class="btn-hex" id="add-field">🌱 + Гекс Поле</button>
        <button class="btn-hex" id="add-forest">🌲 + Гекс Лес</button>
        
        <span>|</span>

        <!-- Кнопки юнитов -->
        <button class="btn-inf" id="add-inf">🏃‍♂️ + Пехота</button>
        <button class="btn-tank" id="add-tank">🚜 + Техника</button>
        <button class="btn-air" id="add-air">✈ + Авиация</button>
    </div>

    <div id="map-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Твоя конфигурация из Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCwSFk9zwr-qldxlVRrjyJNXNz9TJ0_LgA",
            authDomain: "rp-map-218d5.firebaseapp.com",
            databaseURL: "https://rp-map-218d5-default-rtdb.firebaseio.com",
            projectId: "rp-map-218d5",
            storageBucket: "rp-map-218d5.appspot.com",
            messagingSenderId: "786305486724",
            appId: "1:786305486724:web:fbc318ab0864fa821897d1",
            measurementId: "G-VM0FCZX9D8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const map = document.getElementById('map-container');

        // Ссылки на изображения гексов
        const hexImages = {
            town: 'Gemini_Generated_Image_l1rwmbl1rwmbl1rw-Photoroom.jpg',
            field: 'Gemini_Generated_Image_tw1eqltw1eqltw1e-Photoroom.jpg',
            forest: 'Gemini_Generated_Image_r7cns8r7cns8r7cn-Photoroom.jpg'
        };

        const emojiMap = { INF: '🏃‍♂️', TNK: '🚜', AIR: '✈' };

        // --- РЕНДЕРИНГ И СИНХРОНИЗАЦИЯ С FIREBASE ---

        onValue(ref(db, 'hexes'), (snapshot) => {
            document.querySelectorAll('.hex').forEach(el => el.remove());
            const hexes = snapshot.val();
            if (hexes) {
                for (let id in hexes) { renderHexElement(id, hexes[id]); }
            }
        });

        onValue(ref(db, 'tokens'), (snapshot) => {
            document.querySelectorAll('.token').forEach(el => el.remove());
            const tokens = snapshot.val();
            if (tokens) {
                for (let id in tokens) { renderTokenElement(id, tokens[id]); }
            }
        });

        // Назначение обработчиков клика внутри модуля
        document.getElementById('add-town').addEventListener('click', () => addHex('town'));
        document.getElementById('add-field').addEventListener('click', () => addHex('field'));
        document.getElementById('add-forest').addEventListener('click', () => addHex('forest'));

        document.getElementById('add-inf').addEventListener('click', () => addToken('INF'));
        document.getElementById('add-tank').addEventListener('click', () => addToken('TNK'));
        document.getElementById('add-air').addEventListener('click', () => addToken('AIR'));

        function addHex(type) {
            const hexId = 'hex_' + Math.random().toString(36).substr(2, 9);
            set(ref(db, 'hexes/' + hexId), { type: type, top: 150, left: 150 });
        }

        function addToken(type) {
            const tokenId = 'token_' + Math.random().toString(36).substr(2, 9);
            set(ref(db, 'tokens/' + tokenId), { type: type, top: 50, left: 50 });
        }

        function renderHexElement(id, data) {
            const hex = document.createElement('div');
            hex.className = 'hex';
            hex.style.backgroundImage = `url('${hexImages[data.type]}')`;
            hex.style.top = data.top + 'px';
            hex.style.left = data.left + 'px';

            setupDrag(hex, 'hexes/' + id, 120, 138);
            setupDelete(hex, 'hexes/' + id);
            map.appendChild(hex);
        }

        function renderTokenElement(id, data) {
            const token = document.createElement('div');
            token.className = 'token token-' + data.type.toLowerCase();
            token.innerText = emojiMap[data.type] || data.type;
            token.style.top = data.top + 'px';
            token.style.left = data.left + 'px';

            setupDrag(token, 'tokens/' + id, 45, 45);
            setupDelete(token, 'tokens/' + id);
            map.appendChild(token);
        }

        function setupDrag(element, dbPath, width, height) {
            element.onmousedown = function(e) {
                if (e.target.className === 'delete-btn') return;
                e.preventDefault();
                
                let shiftX = e.clientX - element.getBoundingClientRect().left;
                let shiftY = e.clientY - element.getBoundingClientRect().top;

                function moveAt(clientX, clientY) {
                    let rect = map.getBoundingClientRect();
                    let left = clientX - rect.left - shiftX;
                    let top = clientY - rect.top - shiftY;

                    left = Math.max(0, Math.min(left, rect.width - width));
                    top = Math.max(0, Math.min(top, rect.height - height));

                    element.style.left = left + 'px';
                    element.style.top = top + 'px';

                    update(ref(db, dbPath), { left: left, top: top });
                }

                function onMouseMove(e) { moveAt(e.clientX, e.clientY); }
                document.addEventListener('mousemove', onMouseMove);

                document.onmouseup = function() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.onmouseup = null;
                };
            };
        }

        function setupDelete(element, dbPath) {
            const del = document.createElement('div');
            del.className = 'delete-btn';
            del.innerText = 'X';
            del.onclick = function(e) {
                e.stopPropagation();
                remove(ref(db, dbPath));
            };
            element.appendChild(del);
        }
    </script>
</body>
</html>
