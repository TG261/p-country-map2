<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система управления картой</title>
    <style>
        body { font-family: Arial, sans-serif; background: #222; color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Боковая панель */
        #sidebar { width: 300px; background: #333; border-right: 1px solid #444; padding: 20px; transition: margin-left 0.3s; display: flex; flex-direction: column; }
        #sidebar.hidden { margin-left: -300px; }
        
        /* Основная область */
        #main-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; position: relative; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 10px 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; }
        
        .btn-inf { background: #4CAF50; color: white; }
        .btn-tank { background: #d32f2f; color: white; }
        .btn-air { background: #FFC107; color: black; }
        .btn-hex { background: #795548; color: white; }
        
        #map-container { position: relative; width: 100%; max-width: 1000px; height: 700px; background: #333; border: 2px solid #555; border-radius: 10px; }
        
        .hex { position: absolute; width: 120px; height: 138.56px; background-size: cover; cursor: grab; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); z-index: 1; }
        .token { position: absolute; width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; z-index: 2; cursor: grab; }
        
        .delete-btn { position: absolute; top: -8px; right: -8px; background: #ff3b30; border-radius: 50%; width: 26px; height: 26px; cursor: pointer; border: 2px solid white; color: white; }
        
        #card-popup { display: none; position: fixed; background: #e6c2b8; padding: 15px; z-index: 10000; color: black; border-radius: 2px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Добавить гекс</h2>
        <div class="controls" style="flex-direction: column; align-items: flex-start;">
            <button class="btn-hex" id="add-town">🏰 + Город</button>
            <button class="btn-hex" id="add-field">🌱 + Поле</button>
            <button class="btn-hex" id="add-forest">🌲 + Лес</button>
            <button class="btn-hex" id="add-bushes">🌿 + Кусты</button>
        </div>
        <button id="toggle-sidebar" style="margin-top: auto;">↔ Свернуть/Развернуть</button>
    </div>

    <div id="main-area">
        <h1>Система управления картой</h1>
        <div class="controls" id="unit-controls">
            <button class="btn-inf" id="add-inf">🏃 + Пехота</button>
            <button class="btn-tank" id="add-tank">🚜 + Техника</button>
            <button class="btn-air" id="add-air">✈️ + Авиация</button>
        </div>
        <div id="map-container"></div>
    </div>

    <div id="card-popup">
        <textarea id="popup-textarea"></textarea>
        <button id="save-btn">💾 Сохранить</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onChildAdded, onChildChanged, onChildRemoved, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        // Логика сворачивания панели
        document.getElementById('toggle-sidebar').onclick = () => {
            document.getElementById('sidebar').classList.toggle('hidden');
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDwsFk9zwr-q1dxlVRrjyJNXNz9TJ0_LgA",
            authDomain: "rp-map-218d5.firebaseapp.com",
            databaseURL: "https://rp-map-218d5-default-rtdb.firebaseio.com",
            projectId: "rp-map-218d5",
            storageBucket: "rp-map-218d5.firebasestorage.app",
            messagingSenderId: "786305486724",
            appId: "1:786305486724:web:fbc318ab0864fa821897d1"
        };
        const db = getDatabase(initializeApp(firebaseConfig));
        const mapContainer = document.getElementById('map-container');
        
        // ... (оставшаяся логика Firebase остается прежней)
        
        document.getElementById('add-town').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'town', top: 100, left: 100 });
        document.getElementById('add-field').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'field', top: 100, left: 100 });
        document.getElementById('add-forest').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'forest', top: 100, left: 100 });
        document.getElementById('add-bushes').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'bushes', top: 100, left: 100 });
        
        document.getElementById('add-inf').onclick = () => set(ref(db, 'tokens/' + Date.now()), { type: 'INF', top: 50, left: 50 });
        document.getElementById('add-tank').onclick = () => set(ref(db, 'tokens/' + Date.now()), { type: 'TNK', top: 50, left: 50 });
        document.getElementById('add-air').onclick = () => set(ref(db, 'tokens/' + Date.now()), { type: 'AIR', top: 50, left: 50 });
    </script>
</body>
</html>
