    <style>
        body { font-family: Arial, sans-serif; background: #222; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .controls { margin: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; align-items: center; }
        button { padding: 10px 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; display: flex; align-items: center; gap: 5px; user-select: none; }
        .btn-inf { background: #4CAF50; color: white; }
        .btn-tank { background: #d32f2f; color: white; }
        .btn-air { background: #FFC107; color: black; }
        .btn-hex { background: #795548; color: white; }
        .btn-share { background: #0088cc; color: white; }
        
        #map-container { position: relative; width: 1000px; height: 600px; background: #333; border: 2px solid #555; margin: 20px auto; overflow: hidden; border-radius: 10px; }
        .hex { position: absolute; width: 100px; height: 115.47px; background-size: cover; background-position: center; cursor: grab; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); z-index: 1; }
        .token { position: absolute; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: grab; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 2px solid white; z-index: 2; }
        .token-inf { background: #2e7d32 !important; }
        .token-tnk { background: #d32f2f !important; }
        .token-air { background: #f9a825 !important; }

        /* Кнопка удаления теперь ВИДНА ВСЕГДА */
        .delete-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff3b30;
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        #status-indicator { font-size: 14px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
