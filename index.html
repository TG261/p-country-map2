<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Штаб RP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #222;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        button {
            padding: 10px 15px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-inf { background: #4CAF50; color: white; }
        .btn-tank { background: #2196F3; color: white; }
        .btn-air { background: #FFC107; color: black; }
        .file-input-label {
            background: #9c27b0;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        #map-container {
            position: relative;
            width: 1000px;
            height: 600px;
            background: #444;
            margin: 0 auto;
            border: 4px solid #555;
            overflow: hidden;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;
        }
        .token {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: move;
            user-select: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            font-weight: bold;
        }
        .token-inf { background: #4CAF50; }
        .token-tank { background: #2196F3; }
        .token-air { background: #FFC107; color: black; }
        .delete-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            color: white;
            border-radius: 50%;
            width: 15px;
            height: 15px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Штаб RP</h1>
    <p>Создавайте фишки, двигайте их по карте и управляйте своими армиями!</p>

    <div class="controls">
        <button class="btn-inf" onclick="createToken('inf')">+ Пехота</button>
        <button class="btn-tank" onclick="createToken('tank')">+ Танк</button>
        <button class="btn-air" onclick="createToken('air')">+ Авиация</button>
        
        <label class="file-input-label">
            🗺️ Загрузить карту
            <input type="file" id="map-uploader" accept="image/*" style="display: none;" onchange="uploadMap(this)">
        </label>
    </div>

    <div id="map-container"></div>

    <script>
        const container = document.getElementById('map-container');
        let tokens = JSON.parse(localStorage.getItem('rp_tokens')) || {};

        // Загрузка карты из памяти при старте страницы
        const savedMap = localStorage.getItem('rp_map');
        if (savedMap) {
            container.style.backgroundImage = `url("${savedMap}")`;
        }

        // Отрисовка сохраненных фишек при старте
        for (let id in tokens) {
            renderToken(tokens[id]);
        }

        function uploadMap(input) {
            const file = input.files[0];
            if (!file || !container) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Image = e.target.result;
                container.style.backgroundImage = `url("${base64Image}")`;
                localStorage.setItem('rp_map', base64Image); // Сохраняем карту в браузере
            };
            reader.readAsDataURL(file);
        }

        function createToken(type) {
            const id = 'token_' + Math.random().toString(36).substr(2, 9);
            const tokenData = { id, type, top: 50, left: 50 };
            tokens[id] = tokenData;
            saveTokens();
            renderToken(tokenData);
        }

        function renderToken(tokenData) {
            const el = document.createElement('div');
            el.id = tokenData.id;
            el.className = `token token-${tokenData.type}`;
            el.style.top = tokenData.top + 'px';
            el.style.left = tokenData.left + 'px';

            if(tokenData.type === 'inf') el.innerText = '🎖️';
            if(tokenData.type === 'tank') el.innerText = '🚜';
            if(tokenData.type === 'air') el.innerText = '✈️';

            const del = document.createElement('div');
            del.className = 'delete-btn';
            del.innerText = 'X';
            del.onclick = (e) => {
                e.stopPropagation();
                el.remove();
                delete tokens[tokenData.id];
                saveTokens();
            };
            el.appendChild(del);

            el.onmousedown = function(e) {
                e.preventDefault();
                let shiftX = e.clientX - el.getBoundingClientRect().left;
                let shiftY = e.clientY - el.getBoundingClientRect().top;

                function moveAt(clientX, clientY) {
                    let containerRect = container.getBoundingClientRect();
                    let newLeft = clientX - containerRect.left - shiftX;
                    let newTop = clientY - containerRect.top - shiftY;

                    newLeft = Math.max(0, Math.min(newLeft, containerRect.width - 40));
                    newTop = Math.max(0, Math.min(newTop, containerRect.height - 40));

                    el.style.left = newLeft + 'px';
                    el.style.top = newTop + 'px';

                    tokens[tokenData.id].left = newLeft;
                    tokens[tokenData.id].top = newTop;
                    saveTokens();
                }

                function onMouseMove(e) { moveAt(e.clientX, e.clientY); }
                document.addEventListener('mousemove', onMouseMove);

                document.onmouseup = function() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.onmouseup = null;
                };
            };

            container.appendChild(el);
        }

        function saveTokens() {
            localStorage.setItem('rp_tokens', JSON.stringify(tokens));
        }
    </script>
</body>
</html>
