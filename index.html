<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Система управления картой</title>
<style>
body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 20px; display: flex; gap: 20px; }
.sidebar {
    width: 320px;
    background: #2d2d2d;
    padding: 20px;
    border-radius: 8px;
    border: 1px solid #444;
    height: 85vh;
    overflow-y: auto;
    transition: transform 0.3s ease;
    position: relative;
}
/* Сетка для кнопок как на скриншоте */
.hex-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}
.sidebar.hidden { transform: translateX(-350px); }
#toggle-btn { position: absolute; right: -40px; top: 0; background: #444; color: white; padding: 10px; cursor: pointer; border: none; border-radius: 0 4px 4px 0; }
.sidebar h2 { font-size: 18px; margin-top: 0; text-align: center; margin-bottom: 15px; }
.main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; }
.controls-wrapper { display: flex; gap: 20px; margin-bottom: 20px; }
button { padding: 8px; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; display: flex; align-items: center; gap: 5px; font-size: 12px; }
.btn-hex { background: #5d4037; color: white; justify-content: flex-start; }
#map-container { position: relative; width: 1000px; height: 600px; background: #252525; border: 1px solid #444; overflow: hidden; border-radius: 4px; }
/* ... остальные стили (hex, token, popup) остаются прежними ... */
.hex { position: absolute; width: 120px; height: 120px; background-size: cover; cursor: grab; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); z-index: 1; display: flex; align-items: center; justify-content: center; }
.token { position: absolute; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: grab; border: 2px solid white; z-index: 2; }
.delete-btn { border-radius: 50%; width: 26px; height: 26px; font-size: 14px; background: #ff3b30; cursor: pointer; border: 2px solid white; color: white; position: absolute; top: -8px; right: -8px; display: none; }
.hex:hover .delete-btn { display: flex; }
</style>
</head>
<body>
<div class="sidebar" id="sidebar">
    <button id="toggle-btn"> ☰ </button>
    <h2>Добавить гекс</h2>
    <div class="hex-grid">
        <button class="btn-hex" id="add-town">🏰 Г</button>
        <button class="btn-hex" id="add-field">🌱 П</button>
        <button class="btn-hex" id="add-forest">🌲 Л</button>
        <button class="btn-hex" id="add-bushes">🌿 К</button>
        <button class="btn-hex" id="add-village">🏠 Д</button>
        <button class="btn-hex" id="add-farmland">🌾 П</button>
        <button class="btn-hex" id="add-port">⚓ П</button>
        <button class="btn-hex" id="add-sea">🌊 М</button>
        <button class="btn-hex" id="add-prospekt">🏙️ П</button>
        <button class="btn-hex" id="add-vokzal">🚉 В</button>
        <button class="btn-hex" id="add-railway">🛤️ Ж</button>
        <button class="btn-hex" id="add-turn">↪️ П</button>
        <button class="btn-hex" id="add-hill">⛰️ Х</button>
        <button class="btn-hex" id="add-swamp">💧 Б</button>
        <button class="btn-hex" id="add-road">🛣️ Д</button>
        <button class="btn-hex" id="add-turn-prospekt">🏙️ П</button>
        <button class="btn-hex" id="add-turn-railway">🛤️ П</button>
    </div>
</div>
<script type="module">
// Инициализация Firebase и логика обработчиков кнопок (оставляем без изменений)

</script>
</body>
</html>
