<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Система управления картой</title>
    <style>
        body { font-family: Arial, sans-serif; background: #222; color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 300px; background: #333; border-right: 1px solid #444; padding: 20px; transition: margin-left 0.3s; display: flex; flex-direction: column; }
        #sidebar.hidden { margin-left: -300px; }
        #main-area { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; position: relative; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 10px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; }
        
        #map-container { position: relative; width: 1000px; height: 700px; background: #333; border: 2px solid #555; overflow: hidden; }
        
        .hex { position: absolute; width: 120px; height: 138.56px; background-size: cover; cursor: grab; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); z-index: 1; }
        .token { position: absolute; width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; z-index: 2; cursor: grab; background: #555; }
        .delete-btn { position: absolute; top: -5px; right: -5px; background: #ff3b30; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; border: none; color: white; font-size: 10px; display: none; }
        .hex:hover .delete-btn, .token:hover .delete-btn { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Добавить гекс</h2>
        <button id="add-town" class="btn-hex">🏰 Город</button>
        <button id="add-field" class="btn-hex">🌱 Поле</button>
        <button id="toggle-sidebar" style="margin-top: 20px;">↔ Свернуть/Развернуть</button>
    </div>

    <div id="main-area">
        <h1>Система управления картой</h1>
        <div id="map-container"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onChildAdded, onChildRemoved, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { /* ВАШИ ДАННЫЕ */ };
        const db = getDatabase(initializeApp(firebaseConfig));
        const mapContainer = document.getElementById('map-container');

        // Функция рендера с восстановленной логикой удаления и перетаскивания
        function renderElement(id, data, type) {
            const el = document.createElement('div');
            el.className = type;
            el.id = id;
            el.style.left = data.left + 'px';
            el.style.top = data.top + 'px';
            if(type === 'hex') el.style.backgroundColor = '#795548'; 
            
            const del = document.createElement('button');
            del.className = 'delete-btn'; del.innerText = 'X';
            del.onclick = (e) => { e.stopPropagation(); remove(ref(db, type + 'es/' + id)); };
            el.appendChild(del);

            el.onmousedown = (e) => {
                let shiftX = e.clientX - el.getBoundingClientRect().left;
                let shiftY = e.clientY - el.getBoundingClientRect().top;
                document.onmousemove = (e) => {
                    let left = e.clientX - mapContainer.getBoundingClientRect().left - shiftX;
                    let top = e.clientY - mapContainer.getBoundingClientRect().top - shiftY;
                    el.style.left = left + 'px'; el.style.top = top + 'px';
                    update(ref(db, type + 'es/' + id), { top, left });
                };
                document.onmouseup = () => document.onmousemove = null;
            };
            mapContainer.appendChild(el);
        }

        // Подписки Firebase
        onChildAdded(ref(db, 'hexes'), (s) => renderElement(s.key, s.val(), 'hex'));
        onChildRemoved(ref(db, 'hexes'), (s) => document.getElementById(s.key)?.remove());

        document.getElementById('add-town').onclick = () => set(ref(db, 'hexes/' + Date.now()), { top: 50, left: 50 });
        document.getElementById('toggle-sidebar').onclick = () => document.getElementById('sidebar').classList.toggle('hidden');
    </script>
</body>
</html>
