<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Система управления картой</title>
    <style>
        body { font-family: Arial, sans-serif; background: #222; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .controls { margin: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        button { padding: 10px 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; }
        
        #map-container { position: relative; width: 1000px; height: 600px; background: #333; border: 2px solid #555; margin: 20px auto; overflow: hidden; border-radius: 10px; }
        .hex { position: absolute; width: 100px; height: 115.47px; background-size: cover; background-position: center; cursor: grab; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); z-index: 1; display: flex; align-items: center; justify-content: center; }
        .token { position: absolute; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: grab; border: 2px solid white; z-index: 2; }
        
        /* Стили кнопок */
        .delete-btn, .edit-btn { border-radius: 50%; width: 26px; height: 26px; font-size: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid white; color: white; padding: 0; position: absolute; }
        .token .delete-btn { top: -8px; right: -8px; background: #ff3b30; }
        .token .edit-btn { top: 25px; right: -8px; background: #2196F3; }
        .hex .delete-btn { background: #ff3b30; display: none; z-index: 2; }
        .hex:hover .delete-btn { display: flex; }

        /* Модальное окно "Лист" */
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; background: #fff; color: #333; padding: 20px; border-radius: 10px; z-index: 10000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #modal textarea { width: 100%; height: 150px; margin-top: 10px; }
        #modal button { background: #2196F3; color: white; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>
    <h1>Система управления картой</h1>
    <div class="controls">
        <button id="add-town">🏰 Город</button>
        <button id="add-inf">🏃 Пехота</button>
    </div>
    <div id="map-container"></div>

    <!-- Модальное окно -->
    <div id="modal">
        <h3 id="modal-title">Редактирование</h3>
        <textarea id="modal-textarea"></textarea>
        <button id="save-btn">Сохранить</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onChildAdded, onChildChanged, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const db = getDatabase(initializeApp({ /* конфиг тот же */ }));
        const mapContainer = document.getElementById('map-container');
        const modal = document.getElementById('modal');
        const modalText = document.getElementById('modal-textarea');
        let currentTokenId = null;

        function renderElement(id, data, type) {
            const el = document.createElement('div');
            el.className = type === 'hex' ? 'hex' : 'token';
            el.id = id;
            el.style.top = data.top + 'px'; el.style.left = data.left + 'px';
            
            // Кнопка удаления
            const del = document.createElement('button');
            del.className = 'delete-btn'; del.innerText = 'X';
            del.onclick = (e) => { e.stopPropagation(); remove(ref(db, (type === 'hex' ? 'hexes/' : 'tokens/') + id)); };
            el.appendChild(del);

            // Кнопка карандаша
            if (type === 'token') {
                const edit = document.createElement('button');
                edit.className = 'edit-btn'; edit.innerText = '✎';
                edit.onclick = (e) => { 
                    e.stopPropagation(); 
                    currentTokenId = id;
                    modalText.value = data.info || "";
                    modal.style.display = 'block';
                };
                el.appendChild(edit);
            }
            mapContainer.appendChild(el);
        }

        document.getElementById('save-btn').onclick = () => {
            update(ref(db, 'tokens/' + currentTokenId), { info: modalText.value });
            modal.style.display = 'none';
        };

        // ... остальной код (onChildAdded и т.д. остаются прежними)
    </script>
</body>
</html>
