<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Диагностика карты</title>
</head>
<body>
    <h1>Диагностика</h1>
    <button id="test-btn">Нажми меня для теста</button>
    <div id="log" style="white-space: pre-wrap; font-family: monospace; background: #eee; padding: 10px;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const log = (msg) => {
            console.log(msg);
            document.getElementById('log').innerText += msg + "\n";
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDwsFk9zwr-q1dxlVRrjyJNXNz9TJ0_LgA",
            authDomain: "rp-map-218d5.firebaseapp.com",
            databaseURL: "https://rp-map-218d5-default-rtdb.firebaseio.com",
            projectId: "rp-map-218d5",
            storageBucket: "rp-map-218d5.firebasestorage.app",
            messagingSenderId: "786305486724",
            appId: "1:786305486724:web:fbc318ab0864fa821897d1"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);
            log("Firebase инициализирован успешно.");

            document.getElementById('test-btn').onclick = async () => {
                log("Попытка записи в базу...");
                try {
                    await set(ref(db, 'test'), { time: Date.now() });
                    log("УСПЕХ! Данные записаны.");
                } catch (err) {
                    log("ОШИБКА записи: " + err.message);
                }
            };
        } catch (e) {
            log("КРИТИЧЕСКАЯ ОШИБКА: " + e.message);
        }
    </script>
</body>
</html>
