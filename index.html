<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мультиплеерный Штаб RP</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #222;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        button {
            padding: 10px 15px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn-inf { background: #4CAF50; color: white; }
        .btn-tank { background: #2196F3; color: white; }
        .btn-air { background: #FFC107; color: black; }
        .file-input-label {
            background: #9c27b0;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        #map-container {
            position: relative;
            width: 1000px;
            height: 600px;
            background: #444;
            margin: 0 auto;
            border: 4px solid #555;
            overflow: hidden;
            background-size: cover;
            background-position: center;
        }
        .token {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: move;
            user-select: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            font-weight: bold;
        }
        .token-inf { background: #4CAF50; }
        .token-tank { background: #2196F3; }
        .token-air { background: #FFC107; color: black; }
        .delete-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            color: white;
            border-radius: 50%;
            width: 15px;
            height: 15px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Мультиплеерный Штаб RP</h1>
    <p>Перетаскивание фишек и смена карты синхронизируются в реальном времени!</p>

    <div class="controls">
        <button class="btn-inf" onclick="createToken('inf')">+ Пехота</button>
        <button class="btn-tank" onclick="createToken('tank')">+ Танк</button>
        <button class="btn-air" onclick="createToken('air')">+ Авиация</button>
        
        <!-- Кнопка загрузки карты -->
        <label class="file-input-label">
            🗺️ Загрузить карту
            <input type="file" id="map-uploader" accept="image/*" style="display: none;" onchange="uploadMap(this)">
        </label>
    </div>

    <div id="map-container"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const container = document.getElementById('map-container');

        // Получение начального состояния (фишки и карта)
        socket.on('init-tokens', (tokens) => {
            container.innerHTML = '';
            for (let id in tokens) {
                renderToken(tokens[id]);
            }
        });

        socket.on('update-map', (mapDataUrl) => {
            container.style.backgroundImage = `url(${mapDataUrl})`;
        });

        // Функция отправки картинки карты всем игрокам
        function uploadMap(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Image = e.target.result;
                container.style.backgroundImage = `url(${base64Image})`;
                socket.emit('change-map', base64Image); // Отправляем на сервер
            };
            reader.readAsDataURL(file);
        }

        function createToken(type) {
            const id = 'token_' + Math.random().toString(36).substr(2, 9);
            const tokenData = { id, type, top: 50, left: 50 };
            socket.emit('create-token', tokenData);
        }

        socket.on('token-created', (tokenData) => {
            renderToken(tokenData);
        });

        function renderToken(tokenData) {
            const el = document.createElement('div');
            el.id = tokenData.id;
            el.className = `token token-${tokenData.type}`;
            el.style.top = tokenData.top + 'px';
            el.style.left = tokenData.left + 'px';

            // Иконки для фишек
            if(tokenData.type === 'inf') el.innerText = '🎖️';
            if(tokenData.type === 'tank') el.innerText = '🚜';
            if(tokenData.type === 'air') el.innerText = '✈️';

            // Кнопка удаления
            const del = document.createElement('div');
            del.className = 'delete-btn';
            del.innerText = 'X';
            del.onclick = (e) => {
                e.stopPropagation();
                socket.emit('delete-token', tokenData.id);
            };
            el.appendChild(del);

            // Логика перетаскивания (Drag and Drop)
            el.onmousedown = function(e) {
                e.preventDefault();
                let shiftX = e.clientX - el.getBoundingClientRect().left;
                let shiftY = e.clientY - el.getBoundingClientRect().top;

                function moveAt(clientX, clientY) {
                    let containerRect = container.getBoundingClientRect();
                    let newLeft = clientX - containerRect.left - shiftX;
                    let newTop = clientY - containerRect.top - shiftY;

                    // Ограничиваем фишку рамками карты
                    newLeft = Math.max(0, Math.min(newLeft, containerRect.width - 40));
                    newTop = Math.max(0, Math.min(newTop, containerRect.height - 40));

                    el.style.left = newLeft + 'px';
                    el.style.top = newTop + 'px';

                    socket.emit('move-token', { id: tokenData.id, top: newTop, left: newLeft });
                }

                function onMouseMove(e) { moveAt(e.clientX, e.clientY); }
                document.addEventListener('mousemove', onMouseMove);

                document.onmouseup = function() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.onmouseup = null;
                };
            };

            container.appendChild(el);
        }

        socket.on('token-moved', (moveData) => {
            const el = document.getElementById(moveData.id);
            if (el) {
                el.style.top = moveData.top + 'px';
                el.style.left = moveData.left + 'px';
            }
        });

        socket.on('token-deleted', (tokenId) => {
            const el = document.getElementById(tokenId);
            if (el) el.remove();
        });
    </script>
</body>
</html>
