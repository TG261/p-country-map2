<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мультиплеерный Штаб RP</title>
    <style>
        body { font-family: Arial, sans-serif; background: #222; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .controls { margin: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; align-items: center; }
        button { padding: 10px 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; }
        .btn-inf { background: #4CAF50; color: white; }
        .btn-tank { background: #2196F3; color: white; }
        .btn-air { background: #FFC107; color: black; }
        .url-input { padding: 9px; border-radius: 5px; border: 1px solid #555; background: #333; color: #fff; width: 250px; }
        .file-input-label { background: #9c27b0; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #map-container {
            position: relative;
            width: 1000px;
            height: 600px;
            background: #444;
            margin: 0 auto;
            border: 4px solid #555;
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }
        .token {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: move;
            user-select: none;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .token-inf { background: #4CAF50; }
        .token-tank { background: #2196F3; }
        .token-air { background: #FFC107; color: black; }
        .delete-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            color: white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <h1>Мультиплеерный Штаб RP</h1>
    <p>Все изменения карты и фишек видны обоим игрокам в реальном времени!</p>
    
    <div class="controls">
        <button class="btn-inf" onclick="addToken('INF')">+ Пехота</button>
        <button class="btn-tank" onclick="addToken('TNK')">+ Танк</button>
        <button class="btn-air" onclick="addToken('AIR')">+ Авиация</button>
        
        <label class="file-input-label">
            🗺️ Загрузить файл
            <input type="file" accept="image/*" style="display: none;" onchange="loadMapFromFile(this)">
        </label>

        <input type="text" id="map-url-field" class="url-input" placeholder="Или вставь URL карты для всех..." oninput="sendMapUrl(this.value)">
    </div>

    <div id="map-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Твоя конфигурация из Firebase со скриншота image_a07b83.jpg
        const firebaseConfig = {
            apiKey: "AIzaSyCwSFk9zwr-qldxlVRrjyJNXNz9TJ0_LgA",
            authDomain: "rp-map-218d5.firebaseapp.com",
            databaseURL: "https://rp-map-218d5-default-rtdb.firebaseio.com",
            projectId: "rp-map-218d5",
            storageBucket: "rp-map-218d5.appspot.com",
            messagingSenderId: "786305486724",
            appId: "1:786305486724:web:fbc318ab0864fa821897d1",
            measurementId: "G-VM0FCZX9D8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const map = document.getElementById('map-container');
        const urlField = document.getElementById('map-url-field');

        // Слушаем изменения карты в реальном времени
        onValue(ref(db, 'currentMap'), (snapshot) => {
            const mapData = snapshot.val();
            if (mapData) {
                map.style.backgroundImage = `url("${mapData}")`;
                if(mapData.startsWith('http')) {
                    urlField.value = mapData;
                }
            } else {
                map.style.backgroundImage = 'none';
            }
        });

        // Слушаем изменения фишек в реальном времени
        onValue(ref(db, 'tokens'), (snapshot) => {
            document.querySelectorAll('.token').forEach(el => el.remove());
            const tokens = snapshot.val();
            if (tokens) {
                for (let id in tokens) {
                    renderTokenElement(id, tokens[id]);
                }
            }
        });

        window.loadMapFromFile = function(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                set(ref(db, 'currentMap'), e.target.result);
            };
            reader.readAsDataURL(file);
        }

        window.sendMapUrl = function(url) {
            set(ref(db, 'currentMap'), url.trim());
        }

        window.addToken = function(type) {
            const tokenId = 'token_' + Math.random().toString(36).substr(2, 9);
            set(ref(db, 'tokens/' + tokenId), {
                type: type,
                top: 50,
                left: 50
            });
        }

        function renderTokenElement(id, data) {
            const token = document.createElement('div');
            token.className = 'token token-' + data.type.toLowerCase();
            token.innerText = data.type;
            token.style.top = data.top + 'px';
            token.style.left = data.left + 'px';

            const del = document.createElement('div');
            del.className = 'delete-btn';
            del.innerText = 'X';
            del.onclick = function(e) {
                e.stopPropagation();
                remove(ref(db, 'tokens/' + id));
            };
            token.appendChild(del);

            token.onmousedown = function(e) {
                e.preventDefault();
                let shiftX = e.clientX - token.getBoundingClientRect().left;
                let shiftY = e.clientY - token.getBoundingClientRect().top;

                function moveAt(clientX, clientY) {
                    let rect = map.getBoundingClientRect();
                    let left = clientX - rect.left - shiftX;
                    let top = clientY - rect.top - shiftY;

                    left = Math.max(0, Math.min(left, rect.width - 40));
                    top = Math.max(0, Math.min(top, rect.height - 40));

                    token.style.left = left + 'px';
                    token.style.top = top + 'px';

                    update(ref(db, 'tokens/' + id), {
                        left: left,
                        top: top
                    });
                }

                function onMouseMove(e) { moveAt(e.clientX, e.clientY); }
                document.addEventListener('mousemove', onMouseMove);

                document.onmouseup = function() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.onmouseup = null;
                };
            };

            map.appendChild(token);
        }
    </script>
</body>
</html>
