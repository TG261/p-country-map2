<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Система управления картой</title>
<style>
body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 20px; display: flex; gap: 20px; }
/* Стили для боковой панели с прокруткой */
.sidebar {
    width: 280px;
    background: #2d2d2d;
    padding: 20px;
    border-radius: 8px;
    border: 1px solid #444;
    height: 80vh; 
    overflow-y: auto;
    transition: transform 0.3s ease;
    position: relative;
}
.sidebar.hidden {
    transform: translateX(-310px);
}
#toggle-btn {
    position: absolute;
    right: -40px;
    top: 0;
    background: #444;
    color: white;
    padding: 10px;
    cursor: pointer;
    border: none;
    border-radius: 0 4px 4px 0;
}
.sidebar h2 { font-size: 18px; margin-top: 0; text-align: center; }
.main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; }
.controls-wrapper { display: flex; gap: 20px; margin-bottom: 20px; }
button { padding: 10px 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; display: flex; align-items: center; gap: 5px; }
.btn-inf { background: #4CAF50; color: white; }
.btn-tank { background: #d32f2f; color: white; }
.btn-air { background: #FFC107; color: black; }
.btn-hex { background: #5d4037; color: white; margin-bottom: 10px; width: 100%; justify-content: center; }
#map-container { position: relative; width: 1000px; height: 600px; background: #252525; border: 1px solid #444; overflow: hidden; border-radius: 4px; }
.hex { position: absolute; width: 120px; height: 120px; background-size: cover; cursor: grab;
clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); z-index: 1; display: flex; align-items: center;
justify-content: center; }
.token { position: absolute; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: grab;
border: 2px solid white; z-index: 2; }
.delete-btn, .edit-btn { border-radius: 50%; width: 26px; height: 26px; font-size: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer;
border: 2px solid white; color: white; padding: 0; position: absolute; }
.token .delete-btn { top: -8px; right: -8px; background: #ff3b30; }
.token .edit-btn { top: 25px; right: -8px; background: #2196F3; }
.hex .delete-btn { background: #ff3b30; display: none; z-index: 2; }
.hex:hover .delete-btn { display: flex; }
#card-popup { display: none; position: fixed; background: #e6c2b8; border: 2px solid #000; padding: 15px; z-index: 10000; border-radius: 2px; color: black;
width: 200px; text-align: left; box-shadow: 5px 5px 10px rgba(0,0,0,0.5); }
#popup-textarea { width: 100%; height: 100px; background: transparent; border: 1px solid #000; resize: none; font-family: Arial, sans-serif; white-space: pre-wrap;
margin-top: 5px; }
#save-btn { width: 100%; margin-top: 5px; padding: 5px; background: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>
<div class="sidebar" id="sidebar">
<button id="toggle-btn">   ☰   </button>
<h2>Добавить гекс</h2>
<button class="btn-hex" id="add-town">   🏰   + Город</button>
<button class="btn-hex" id="add-field">   🌱   + Поле</button>
<button class="btn-hex" id="add-forest">   🌲   + Лес</button>
<button class="btn-hex" id="add-bushes">   🌿   + Кусты</button>
<button class="btn-hex" id="add-village">   🏠   + Деревня</button>
<button class="btn-hex" id="add-farmland">   🌾   + Пашня</button>
<button class="btn-hex" id="add-port">   ⚓   +   Морской     Порт   </button>
<button class="btn-hex" id="add-sea">   🌊   + Море</button>
<button class="btn-hex" id="add-prospekt">   🏙️   + Проспект</button>
<button class="btn-hex" id="add-vokzal">   🚉   + Вокзал</button>
<button class="btn-hex" id="add-railway">   🛤️   + Ж/Д</button>
<button class="btn-hex" id="add-turn">   ↪️   + Поворот</button>
<button class="btn-hex" id="add-hill">   ⛰️   + Холм</button>
<button class="btn-hex" id="add-swamp">   💧   + Болото</button>
<button class="btn-hex" id="add-road">   🛣️   + Дорога</button>
<button class="btn-hex" id="add-turn-prospekt">   🏙️   + Поворот Проспект</button>
<button class="btn-hex" id="add-turn-railway">   🛤️   + Поворот Ж/Д</button>
</div>
<div class="main-content">
<h1>Система управления картой</h1>
<div class="controls-wrapper">
<button class="btn-inf" id="add-inf">   🏃   + Пехота</button>
<button class="btn-tank" id="add-tank">   🚜   + Техника</button>
<button class="btn-air" id="add-air">   ✈️   + Авиация</button>
</div>
<div id="map-container"></div>
</div>
<div id="card-popup">
<div style="font-weight: bold; border-bottom: 1px solid #000; margin-bottom: 5px;">КАРТОЧКА</div>
<textarea id="popup-textarea"></textarea>
<button id="save-btn">   💾   Сохранить</button>
</div>
<div id="rotation-popup" style="display: none; position: fixed; background: #333; border: 1px solid #fff; padding: 10px; z-index: 10000; border-radius: 5px;">
<input type="number" id="rotation-input" placeholder="Градусы" style="width: 70px;">
<button id="apply-rotation">Применить</button>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onChildAdded, onChildChanged, onChildRemoved, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
document.getElementById('toggle-btn').onclick = () => {
document.getElementById('sidebar').classList.toggle('hidden');
};
const firebaseConfig = {
apiKey: "AIzaSyDwsFk9zwr-q1dxlVRrjyJNXNz9TJ0_LgA",
authDomain: "rp-map-218d5.firebaseapp.com",
databaseURL: "https://rp-map-218d5-default-rtdb.firebaseio.com",
projectId: "rp-map-218d5",
storageBucket: "rp-map-218d5.firebasestorage.app",
messagingSenderId: "786305486724",
appId: "1:786305486724:web:fbc318ab0864fa821897d1"
};
const db = getDatabase(initializeApp(firebaseConfig));
const mapContainer = document.getElementById('map-container');
const cardPopup = document.getElementById('card-popup');
const popupTextarea = document.getElementById('popup-textarea');
const saveBtn = document.getElementById('save-btn');
const rotationPopup = document.getElementById('rotation-popup');
const rotationInput = document.getElementById('rotation-input');
const applyRotationBtn = document.getElementById('apply-rotation');
let activeTokenId = null;
let hexToRotateId = null;
let activeTokenData = {};
saveBtn.onclick = () => {
if (activeTokenId) {
update(ref(db, 'tokens/' + activeTokenId), { info: popupTextarea.value });
cardPopup.style.display = 'none';
activeTokenId = null;
}
};
applyRotationBtn.onclick = () => {
if (hexToRotateId) {
update(ref(db, 'hexes/' + hexToRotateId), { rotation: parseInt(rotationInput.value) || 0 });
rotationPopup.style.display = 'none';
}
};
const hexImages = {
town: 'assets/Город.png', field: 'assets/Равнина.png', forest: 'assets/Лес.png', bushes: 'assets/Кусты.png',
village: 'assets/Деревня.png', farmland: 'assets/Пашня.png', port: 'assets/Морской Порт.png', sea: 'assets/Море.png',
prospekt: 'assets/Проспект.png', vokzal: 'assets/Вокзал.png', railway: 'assets/Железная дорога.png',
turn: 'assets/Поворот.png', hill: 'assets/Холм.png', swamp: 'assets/Болото.png', road: 'assets/Дорога.png',
turn_prospekt: 'assets/Поворот Проспект.png', turn_railway: 'assets/Поворот ЖД.png'
};
const tokenIcons = { INF: '   🏃   ', TNK: '   🚜   ', AIR: '   ✈️   ' };
function renderElement(id, data, type) {
const el = document.createElement('div');
el.className = type === 'hex' ? 'hex' : `token token-${data.type ? data.type.toLowerCase() : 'default'}`;
el.id = id;
el.style.top = data.top + 'px'; el.style.left = data.left + 'px';
if (type === 'hex') {
el.style.backgroundImage = `url('${hexImages[data.type]}')`;
el.style.transform = `rotate(${data.rotation || 0}deg)`;
el.onclick = (e) => {
if (e.target.className === 'delete-btn') return;
hexToRotateId = id;
rotationPopup.style.display = 'block';
rotationPopup.style.left = (e.clientX + 10) + 'px';
rotationPopup.style.top = (e.clientY + 10) + 'px';
};
} else {
el.innerText = tokenIcons[data.type];
}
const del = document.createElement('button');
del.className = 'delete-btn'; del.innerText = 'X';
del.onclick = (e) => { e.stopPropagation(); remove(ref(db, (type === 'hex' ? 'hexes/' : 'tokens/') + id)); };
el.appendChild(del);
if (type === 'token') {
const edit = document.createElement('button');
edit.className = 'edit-btn'; edit.innerText = '   ✎   ';
edit.onclick = (e) => {
e.stopPropagation();
activeTokenId = id;
cardPopup.style.display = 'block';
cardPopup.style.left = (e.clientX + 15) + 'px';
cardPopup.style.top = (e.clientY + 15) + 'px';
popupTextarea.value = activeTokenData[id]?.info || data.info || "";
};
el.appendChild(edit);
}
el.onmousedown = (e) => {
if (e.target.className === 'delete-btn' || e.target.className === 'edit-btn') return;
let shiftX = e.clientX - el.getBoundingClientRect().left;
let shiftY = e.clientY - el.getBoundingClientRect().top;
document.onmousemove = (e) => {
let x = e.clientX - mapContainer.getBoundingClientRect().left - shiftX;
let y = e.clientY - mapContainer.getBoundingClientRect().top - shiftY;
el.style.left = x + 'px'; el.style.top = y + 'px';
update(ref(db, (type === 'hex' ? 'hexes/' : 'tokens/') + id), { top: y, left: x });
};
document.onmouseup = () => { document.onmousemove = null; };
};
mapContainer.appendChild(el);
}
onChildAdded(ref(db, 'hexes'), (s) => renderElement(s.key, s.val(), 'hex'));
onChildAdded(ref(db, 'tokens'), (s) => { activeTokenData[s.key] = s.val(); renderElement(s.key, s.val(), 'token'); });
onChildChanged(ref(db, 'tokens'), (s) => {
activeTokenData[s.key] = s.val();
const el = document.getElementById(s.key);
if(el) { el.style.top = s.val().top + 'px'; el.style.left = s.val().left + 'px'; }
if (activeTokenId === s.key && cardPopup.style.display === 'block' && document.activeElement !== popupTextarea) popupTextarea.value = s.val().info || "";
});
onChildChanged(ref(db, 'hexes'), (s) => {
const el = document.getElementById(s.key);
if(el) {
el.style.top = s.val().top + 'px';
el.style.left = s.val().left + 'px';
el.style.transform = `rotate(${s.val().rotation || 0}deg)`;
}
});
onChildRemoved(ref(db, 'hexes'), (s) => document.getElementById(s.key)?.remove());
onChildRemoved(ref(db, 'tokens'), (s) => { delete activeTokenData[s.key]; document.getElementById(s.key)?.remove(); });
document.getElementById('add-town').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'town', top: 150, left: 150, rotation: 0 });
document.getElementById('add-field').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'field', top: 150, left: 150, rotation: 0 });
document.getElementById('add-forest').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'forest', top: 150, left: 150, rotation: 0 });
document.getElementById('add-bushes').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'bushes', top: 150, left: 150, rotation: 0 });
document.getElementById('add-village').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'village', top: 150, left: 150, rotation: 0 });
document.getElementById('add-farmland').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'farmland', top: 150, left: 150, rotation: 0 });
document.getElementById('add-port').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'port', top: 150, left: 150, rotation: 0 });
document.getElementById('add-sea').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'sea', top: 150, left: 150, rotation: 0 });
document.getElementById('add-prospekt').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'prospekt', top: 150, left: 150, rotation: 0 });
document.getElementById('add-vokzal').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'vokzal', top: 150, left: 150, rotation: 0 });
document.getElementById('add-railway').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'railway', top: 150, left: 150, rotation: 0 });
document.getElementById('add-turn').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'turn', top: 150, left: 150, rotation: 0 });
document.getElementById('add-hill').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'hill', top: 150, left: 150, rotation: 0 });
document.getElementById('add-swamp').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'swamp', top: 150, left: 150, rotation: 0 });
document.getElementById('add-road').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'road', top: 150, left: 150, rotation: 0 });
document.getElementById('add-turn-prospekt').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'turn_prospekt', top: 150, left: 150, rotation: 0 });
document.getElementById('add-turn-railway').onclick = () => set(ref(db, 'hexes/' + Date.now()), { type: 'turn_railway', top: 150, left: 150, rotation: 0 });
document.getElementById('add-inf').onclick = () => set(ref(db, 'tokens/' + Date.now()), { type: 'INF', top: 50, left: 50, info: "Пехота" });
document.getElementById('add-tank').onclick = () => set(ref(db, 'tokens/' + Date.now()), { type: 'TNK', top: 50, left: 50, info: "Техника" });
document.getElementById('add-air').onclick = () => set(ref(db, 'tokens/' + Date.now()), { type: 'AIR', top: 50, left: 50, info: "Авиация" });
</script>
</body>
</html>
