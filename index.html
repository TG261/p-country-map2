<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Система управления картой</title>
    <style>
        body { font-family: Arial, sans-serif; background: #222; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .controls-wrapper { display: flex; justify-content: center; gap: 50px; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        button { padding: 10px 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; }
        .btn-hex { background: #795548; color: white; }
        .btn-inf { background: #4CAF50; color: white; }
        .btn-tank { background: #d32f2f; color: white; }
        .btn-air { background: #FFC107; color: black; }
        
        #map-container { position: relative; width: 1200px; height: 800px; background: #333; border: 2px solid #555; margin: 0 auto; overflow: hidden; border-radius: 10px; }
        
        .hex { position: absolute; width: 120px; height: 138.56px; background-size: cover; background-position: center; cursor: grab; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); z-index: 1; display: flex; align-items: center; justify-content: center; transition: transform 0.3s; }
        
        .hex-number { position: absolute; bottom: 20px; right: 25px; font-size: 24px; font-weight: bold; color: white; text-shadow: 2px 2px 4px #000; z-index: 2; pointer-events: none; }
        
        .delete-btn { position: absolute; top: 5px; left: 5px; background: #ff3b30; color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; display: none; z-index: 3; }
        .hex:hover .delete-btn { display: block; }
        
        #card-popup { display: none; position: fixed; background: #e6c2b8; padding: 15px; z-index: 10000; border-radius: 5px; color: black; width: 200px; }
    </style>
</head>
<body>
    <div class="controls-wrapper">
        <div class="controls">
            <button class="btn-hex" onclick="addHex('town')">🏰 Город</button>
            <button class="btn-hex" onclick="addHex('field')">🌱 Поле</button>
            <button class="btn-hex" onclick="addHex('forest')">🌲 Лес</button>
            <button class="btn-hex" onclick="addHex('bushes')">🌿 Кусты</button>
        </div>
        <div class="controls">
            <button class="btn-inf" onclick="addToken('INF')">🏃 Пехота</button>
            <button class="btn-tank" onclick="addToken('TNK')">🚜 Техника</button>
            <button class="btn-air" onclick="addToken('AIR')">✈️ Авиация</button>
        </div>
    </div>
    <div id="map-container"></div>
    <div id="card-popup">
        <input type="text" id="num-input" placeholder="Номер гекса">
        <button id="save-num">Сохранить</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onChildAdded, onChildChanged, onChildRemoved, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const firebaseConfig = { /* ВАШ КОНФИГ */ };
        const db = getDatabase(initializeApp(firebaseConfig));
        const mapContainer = document.getElementById('map-container');
        const hexImages = { town: 'assets/Город.png', field: 'assets/Равнина.png', forest: 'assets/Лес.png', bushes: 'assets/Кусты.png' };

        window.addHex = (type) => set(ref(db, 'hexes/' + Date.now()), { type, top: 100, left: 100, rotation: 0, number: "" });
        window.addToken = (type) => set(ref(db, 'tokens/' + Date.now()), { type, top: 50, left: 50 });

        function renderElement(id, data, type) {
            const el = document.createElement('div');
            el.id = id;
            if (type === 'hex') {
                el.className = 'hex';
                el.style.backgroundImage = `url('${hexImages[data.type]}')`;
                el.style.transform = `rotate(${data.rotation || 0}deg)`;
                
                const num = document.createElement('div');
                num.className = 'hex-number';
                num.innerText = data.number || "";
                el.appendChild(num);

                el.ondblclick = () => update(ref(db, 'hexes/' + id), { rotation: (data.rotation || 0) + 60 });
                el.oncontextmenu = (e) => {
                    e.preventDefault();
                    document.getElementById('card-popup').style.display = 'block';
                    document.getElementById('card-popup').style.top = e.clientY + 'px';
                    document.getElementById('card-popup').style.left = e.clientX + 'px';
                    document.getElementById('save-num').onclick = () => {
                        update(ref(db, 'hexes/' + id), { number: document.getElementById('num-input').value });
                        document.getElementById('card-popup').style.display = 'none';
                    };
                };
            } else {
                el.className = 'token';
                el.innerText = {INF:'🏃', TNK:'🚜', AIR:'✈️'}[data.type];
            }
            
            el.style.top = data.top + 'px'; el.style.left = data.left + 'px';
            el.onmousedown = (e) => { /* логика перемещения ... */ };
            mapContainer.appendChild(el);
        }

        onChildAdded(ref(db, 'hexes'), (s) => renderElement(s.key, s.val(), 'hex'));
        onChildChanged(ref(db, 'hexes'), (s) => {
            const el = document.getElementById(s.key);
            if(el) {
                el.style.transform = `rotate(${s.val().rotation || 0}deg)`;
                el.querySelector('.hex-number').innerText = s.val().number || "";
            }
        });
        // ... (остальной код)
    </script>
</body>
</html>
