<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Система управления картой</title>
    <style>
        body { font-family: Arial, sans-serif; background: #222; color: #fff; text-align: center; margin: 0; padding: 20px; }
        /* Панель управления */
        .panel { background: #444; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .hex-number { position: absolute; bottom: 10px; right: 15px; font-weight: bold; background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 3px; pointer-events: none; }
        .hex { transition: transform 0.3s; position: absolute; width: 120px; height: 138.56px; background-size: cover; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); }
        .rotate-btn { position: absolute; top: 25px; left: -10px; background: #4CAF50; border-radius: 50%; width: 25px; height: 25px; border: 1px solid white; cursor: pointer; }
        /* Остальные стили для юнитов остаются прежними */
    </style>
</head>
<body>
    <div class="panel">
        <h3>Выбрать гекс</h3>
        <button onclick="addHex('field')">Равнина</button>
        <button onclick="addHex('forest')">Лес</button>
        <button onclick="addHex('town')">Город</button>
        <button onclick="addHex('bushes')">Кусты</button>
    </div>
    <div id="map-container" style="position:relative; width:1200px; height:800px; background:#333; margin:auto;"></div>

    <script type="module">
        import { getDatabase, ref, set, onChildAdded, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        // ... (инициализация Firebase)
        
        window.addHex = (type) => set(ref(db, 'hexes/' + Date.now()), { type, top: 100, left: 100, rotation: 0, number: "0" });

        function renderElement(id, data, type) {
            const el = document.createElement('div');
            el.className = 'hex';
            el.style.transform = `rotate(${data.rotation || 0}deg)`;
            
            // Кнопка поворота
            const rotBtn = document.createElement('button');
            rotBtn.className = 'rotate-btn'; rotBtn.innerText = '⟳';
            rotBtn.onclick = () => update(ref(db, 'hexes/' + id), { rotation: (data.rotation || 0) + 60 });
            
            // Нумерация
            const numDiv = document.createElement('div');
            numDiv.className = 'hex-number';
            numDiv.innerText = data.number;
            
            el.appendChild(rotBtn);
            el.appendChild(numDiv);
            // ... (логика перетаскивания и добавления в DOM)
        }
        // ...
    </script>
</body>
</html>
