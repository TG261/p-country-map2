<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Система управления картой</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Боковая панель */
        #sidebar { width: 300px; background: #2d2d2d; padding: 20px; transition: margin-left 0.3s; border-right: 1px solid #444; flex-shrink: 0; }
        #sidebar.hidden { margin-left: -300px; }
        
        #main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        button { padding: 10px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; }
        .btn-hex { background: #795548; color: white; }
        .btn-inf { background: #4CAF50; color: white; }
        .btn-tank { background: #d32f2f; color: white; }
        .btn-air { background: #FFC107; color: black; }
        
        #map-container { position: relative; width: 1000px; height: 700px; background: #262626; border: 1px solid #444; border-radius: 8px; overflow: hidden; margin-top: 20px; }
        
        .hex { position: absolute; width: 120px; height: 138.56px; background-size: cover; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); transition: transform 0.3s; z-index: 1; display: flex; align-items: center; justify-content: center; }
        .token { position: absolute; width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; z-index: 2; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: grab; }
        
        .rotate-btn { position: absolute; top: 10px; right: 10px; background: #4CAF50; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; border: none; color: white; }
        .num-badge { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        #card-popup { display: none; position: fixed; background: #e6c2b8; border: 2px solid #000; padding: 15px; z-index: 10000; color: black; width: 200px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>Добавить гекс</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn-hex" id="add-town">🏰 Город</button>
            <button class="btn-hex" id="add-field">🌱 Поле</button>
            <button class="btn-hex" id="add-forest">🌲 Лес</button>
            <button class="btn-hex" id="add-bushes">🌿 Кусты</button>
        </div>
        <button onclick="document.getElementById('sidebar').classList.toggle('hidden')" style="margin-top:20px; width:100%">Свернуть/Развернуть</button>
    </div>

    <div id="main-content">
        <h1>Система управления картой</h1>
        <div style="margin-bottom: 20px;">
            <button class="btn-inf" id="add-inf">🏃 Пехота</button>
            <button class="btn-tank" id="add-tank">🚜 Техника</button>
            <button class="btn-air" id="add-air">✈️ Авиация</button>
        </div>
        <div id="map-container"></div>
    </div>

    <div id="card-popup">
        <textarea id="popup-textarea" style="width:100%; height:100px;"></textarea>
        <button id="save-btn" style="width:100%">💾 Сохранить</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onChildAdded, onChildChanged, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDwsFk9zwr-q1dxlVRrjyJNXNz9TJ0_LgA",
            authDomain: "rp-map-218d5.firebaseapp.com",
            databaseURL: "https://rp-map-218d5-default-rtdb.firebaseio.com",
            projectId: "rp-map-218d5"
        };
        const db = getDatabase(initializeApp(firebaseConfig));
        const mapContainer = document.getElementById('map-container');

        window.addHex = (type) => set(ref(db, 'hexes/' + Date.now()), { type, top: 100, left: 100, rotation: 0, number: "1" });
        window.addToken = (type) => set(ref(db, 'tokens/' + Date.now()), { type, top: 50, left: 50, info: "" });

        function renderElement(id, data, type) {
            const el = document.createElement('div');
            el.id = id;
            el.className = type;
            el.style.top = data.top + 'px'; el.style.left = data.left + 'px';
            
            if (type === 'hex') {
                el.style.backgroundImage = `url('assets/${data.type}.png')`;
                el.style.transform = `rotate(${data.rotation || 0}deg)`;
                el.innerHTML = `<button class="rotate-btn" onclick="rotateHex('${id}', ${data.rotation || 0})">⟳</button>
                               <div class="num-badge" onclick="editNum('${id}')">${data.number || "1"}</div>`;
            } else {
                el.innerText = {INF:'🏃', TNK:'🚜', AIR:'✈️'}[data.type];
            }
            
            el.onmousedown = (e) => {
                let shiftX = e.clientX - el.getBoundingClientRect().left;
                let shiftY = e.clientY - el.getBoundingClientRect().top;
                document.onmousemove = (e) => {
                    let x = e.clientX - mapContainer.getBoundingClientRect().left - shiftX;
                    let y = e.clientY - mapContainer.getBoundingClientRect().top - shiftY;
                    el.style.left = x + 'px'; el.style.top = y + 'px';
                    update(ref(db, (type === 'hex' ? 'hexes/' : 'tokens/') + id), { top: y, left: x });
                };
                document.onmouseup = () => document.onmousemove = null;
            };
            mapContainer.appendChild(el);
        }

        window.rotateHex = (id, rot) => update(ref(db, 'hexes/' + id), { rotation: rot + 60 });
        window.editNum = (id) => {
            const num = prompt("Введите номер:");
            if(num) update(ref(db, 'hexes/' + id), { number: num });
        };

        onChildAdded(ref(db, 'hexes'), (s) => renderElement(s.key, s.val(), 'hex'));
        onChildAdded(ref(db, 'tokens'), (s) => renderElement(s.key, s.val(), 'token'));
        
        document.getElementById('add-town').onclick = () => addHex('town');
        document.getElementById('add-field').onclick = () => addHex('field');
        document.getElementById('add-forest').onclick = () => addHex('forest');
        document.getElementById('add-bushes').onclick = () => addHex('bushes');
        
        document.getElementById('add-inf').onclick = () => addToken('INF');
        document.getElementById('add-tank').onclick = () => addToken('TNK');
        document.getElementById('add-air').onclick = () => addToken('AIR');
    </script>
</body>
</html>
