<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мультиплеерный Штаб RP</title>
    <!-- Подключаем Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { margin-bottom: 5px; color: #e0e0e0; }
        .hint { font-size: 0.9em; color: #aaa; margin-bottom: 15px; }
        
        .controls {
            background: #2a2a2a;
            padding: 15px 25px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .btn {
            color: white; border: none; padding: 10px 15px;
            border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        .btn-inf { background: #4caf50; }
        .btn-tank { background: #3a7bd5; }
        .btn-air { background: #f1c40f; color: #333; }

        .map-container {
            position: relative;
            border: 3px solid #444;
            border-radius: 8px;
            background-color: #333;
            width: 1000px;
            height: 700px;
            background-image: url('https://via.placeholder.com/1000x700/333333/ffffff?text=Замените+на+вашу+карту');
            background-size: cover;
        }

        .token {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: move;
            box-shadow: 0 4px 8px rgba(0,0,0,0.6);
            border: 2px solid white;
            user-select: none;
            z-index: 10;
        }
        .token.infantry { background: #4caf50; width: 40px; height: 40px; font-size: 18px; }
        .token.tank { background: #3a7bd5; width: 50px; height: 50px; font-size: 24px; }
        .token.aviation { background: #f1c40f; width: 45px; height: 45px; font-size: 22px; }
    </style>
</head>
<body>

    <h1>Мультиплеерный Штаб RP</h1>
    <div class="hint">Откройте эту страницу в двух вкладках. Перетаскивание теперь полностью синхронизировано!</div>

    <div class="controls">
        <button class="btn btn-inf" onclick="sendTokenCreation('infantry', '🪖')">+ Пехота</button>
        <button class="btn btn-tank" onclick="sendTokenCreation('tank', '🚜')">+ Танк</button>
        <button class="btn btn-air" onclick="sendTokenCreation('aviation', '🛩️')">+ Авиация</button>
    </div>

    <div class="map-container" id="map-container"></div>

    <script>
        const socket = io();
        const mapContainer = document.getElementById('map-container');

        // 1. Отправка запроса на создание фишки
        function sendTokenCreation(type, icon) {
            const tokenData = {
                id: 'token_' + Math.random().toString(36).substr(2, 9),
                type: type,
                icon: icon,
                top: 50,
                left: 50
            };
            socket.emit('create-token', tokenData);
        }

        // 2. Создание элемента фишки на странице
        function renderToken(data) {
            // Если фишка уже есть (например, при перемещении), не создаем её заново
            if (document.getElementById(data.id)) return;

            const token = document.createElement('div');
            token.id = data.id;
            token.classList.add('token', data.type);
            token.innerText = data.icon;
            token.style.top = data.top + 'px';
            token.style.left = data.left + 'px';

            makeDragable(token);

            // Удаление по двойному клику
            token.addEventListener('dblclick', () => {
                socket.emit('delete-token', token.id);
            });

            mapContainer.appendChild(token);
        }

        // --- Обработка сигналов от сервера ---
        
        // Получаем все фишки при первом зачете на сайт
        socket.on('init-tokens', (tokens) => {
            mapContainer.innerHTML = ''; 
            Object.values(tokens).forEach(renderToken);
        });

        // Кто-то создал фишку
        socket.on('token-created', (tokenData) => {
            renderToken(tokenData);
        });

        // КЛЮЧЕВОЕ ИСПРАВЛЕНИЕ: Кто-то передвинул фишку — двигаем её у себя на экране
        socket.on('token-moved', (moveData) => {
            const token = document.getElementById(moveData.id);
            if (token) {
                token.style.top = moveData.top + 'px';
                token.style.left = moveData.left + 'px';
            }
        });

        // Кто-то удалил фишку
        socket.on('token-deleted', (tokenId) => {
            const token = document.getElementById(tokenId);
            if (token) token.remove();
        });

        // --- Функция перетаскивания мышкой ---
        function makeDragable(element) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            
            element.onmousedown = (e) => {
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                
                document.onmouseup = () => {
                    document.onmouseup = null;
                    document.onmousemove = null;
                };
                
                document.onmousemove = (e) => {
                    e.preventDefault();
                    pos1 = pos3 - e.clientX;
                    pos2 = pos4 - e.clientY;
                    pos3 = e.clientX;
                    pos4 = e.clientY;

                    let newTop = element.offsetTop - pos2;
                    let newLeft = element.offsetLeft - pos1;

                    // Ограничения границ карты
                    if (newTop < 0) newTop = 0;
                    if (newTop > mapContainer.offsetHeight - element.offsetHeight) newTop = mapContainer.offsetHeight - element.offsetHeight;
                    if (newLeft < 0) newLeft = 0;
                    if (newLeft > mapContainer.offsetWidth - element.offsetWidth) newLeft = mapContainer.offsetWidth - element.offsetWidth;

                    element.style.top = newTop + "px";
                    element.style.left = newLeft + "px";

                    // Моментально отправляем новые координаты второму игроку
                    socket.emit('move-token', { id: element.id, top: newTop, left: newLeft });
                };
            };
        }
    </script>
</body>
</html>
