<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Штаб RP</title>
    <style>
        body { font-family: Arial, sans-serif; background: #222; color: #fff; text-align: center; }
        .controls { margin: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; align-items: center; }
        button { padding: 10px 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; }
        .btn-inf { background: #4CAF50; color: white; }
        .btn-tank { background: #2196F3; color: white; }
        .btn-air { background: #FFC107; color: black; }
        .btn-share { background: #e91e63; color: white; }
        #map-container {
            position: relative;
            width: 1000px;
            height: 600px;
            background: #444;
            margin: 0 auto;
            border: 4px solid #555;
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }
        .token {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: move;
            user-select: none;
            font-weight: bold;
        }
        .token-inf { background: #4CAF50; }
        .token-tank { background: #2196F3; }
        .token-air { background: #FFC107; color: black; }
        .delete-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            color: white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <h1>Штаб RP</h1>
    
    <div class="controls">
        <button class="btn-inf" onclick="addToken('INF')">+ Пехота</button>
        <button class="btn-tank" onclick="addToken('TNK')">+ Танк</button>
        <button class="btn-air" onclick="addToken('AIR')">+ Авиация</button>
        <input type="file" accept="image/*" onchange="loadMap(this)">
        <button class="btn-share" onclick="copyShareLink()">🔗 Ссылка для друга</button>
    </div>

    <div id="map-container"></div>

    <script>
        const map = document.getElementById('map-container');
        let tokensData = []; // Храним массив данных о фишках для генерации ссылки
        let currentMapBase64 = "";

        // Проверяем, есть ли данные в ссылке при открытии сайта
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const stateParam = urlParams.get('state');
            
            if (stateParam) {
                try {
                    const decodedData = JSON.parse(decodeURIComponent(escape(atob(stateParam))));
                    
                    // Восстанавливаем карту
                    if (decodedData.map) {
                        currentMapBase64 = decodedData.map;
                        map.style.backgroundImage = "url('" + currentMapBase64 + "')";
                    }
                    
                    // Восстанавливаем фишки
                    if (decodedData.tokens) {
                        decodedData.tokens.forEach(t => {
                            createTokenElement(t.type, t.top, t.left);
                        });
                    }
                } catch (e) {
                    console.error("Ошибка чтения ссылки:", e);
                }
            }
        };
        
        // Загрузка карты
        function loadMap(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                currentMapBase64 = e.target.result;
                map.style.backgroundImage = "url('" + currentMapBase64 + "')";
            };
            reader.readAsDataURL(file);
        }

        // Логика добавления фишки кнопкой
        function addToken(type) {
            createTokenElement(type, '50px', '50px');
        }

        // Создание элемента фишки на поле
        function createTokenElement(type, initialTop, initialLeft) {
            const token = document.createElement('div');
            const tokenId = 'token_' + Math.random().toString(36).substr(2, 9);
            token.className = 'token token-' + type.toLowerCase();
            token.innerText = type;
            token.style.top = initialTop;
            token.style.left = initialLeft;
            token.dataset.id = tokenId;

            // Запоминаем в наш массив данных
            tokensData.push({ id: tokenId, type: type, top: initialTop, left: initialLeft });

            // Кнопка удаления
            const del = document.createElement('div');
            del.className = 'delete-btn';
            del.innerText = 'X';
            del.onclick = function(e) {
                e.stopPropagation();
                tokensData = tokensData.filter(t => t.id !== tokenId);
                token.remove();
            };
            token.appendChild(del);

            // Перетаскивание
            token.onmousedown = function(e) {
                e.preventDefault();
                let shiftX = e.clientX - token.getBoundingClientRect().left;
                let shiftY = e.clientY - token.getBoundingClientRect().top;

                function moveAt(clientX, clientY) {
                    let rect = map.getBoundingClientRect();
                    let left = clientX - rect.left - shiftX;
                    let top = clientY - rect.top - shiftY;

                    left = Math.max(0, Math.min(left, rect.width - 40));
                    top = Math.max(0, Math.min(top, rect.height - 40));

                    token.style.left = left + 'px';
                    token.style.top = top + 'px';

                    // Обновляем координаты в массиве
                    const found = tokensData.find(t => t.id === tokenId);
                    if (found) {
                        found.left = left + 'px';
                        found.top = top + 'px';
                    }
                }

                function onMouseMove(e) { moveAt(e.clientX, e.clientY); }
                document.addEventListener('mousemove', onMouseMove);

                document.onmouseup = function() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.onmouseup = null;
                };
            };

            map.appendChild(token);
        }

        // Функция генерации ссылки для друга
        function copyShareLink() {
            const state = {
                map: currentMapBase64,
                tokens: tokensData
            };
            
            try {
                // Кодируем объект в строку Base64
                const jsonString = unescape(encodeURIComponent(JSON.stringify(state)));
                const base64State = btoa(jsonString);
                
                // Собираем финальный URL
                const shareUrl = window.location.origin + window.location.pathname + '?state=' + base64State;
                
                // Копируем в буфер обмена
                navigator.clipboard.writeText(shareUrl).then(() => {
                    alert('Ссылка скопирована! Отправь её другу, и он увидит твою карту и фишки.');
                }).catch(err => {
                    console.error('Не удалось скопировать:', err);
                    // Запасной вариант, если браузер блокирует clipboard API
                    prompt('Скопируй эту ссылку вручную:', shareUrl);
                });
            } catch(e) {
                alert('Картинка слишком большая для передачи через ссылку. Попробуй использовать карту меньшего размера (до 200-300 Кб).');
            }
        }
    </script>
</body>
</html>
