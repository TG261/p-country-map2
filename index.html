<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Система управления картой</title>
    <style>
        body { font-family: Arial, sans-serif; background: #222; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .controls-wrapper { display: flex; justify-content: center; gap: 50px; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        
        button { padding: 10px 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; display: flex; align-items: center; gap: 5px; }
        .btn-inf { background: #4CAF50; color: white; }
        .btn-tank { background: #d32f2f; color: white; }
        .btn-air { background: #FFC107; color: black; }
        .btn-hex { background: #795548; color: white; }
        
        #map-container { position: relative; width: 1200px; height: 800px; background: #333; border: 2px solid #555; margin: 0 auto; overflow: hidden; border-radius: 10px; }
        
        .hex { position: absolute; width: 120px; height: 138.56px; background-size: cover; cursor: grab; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); transition: transform 0.3s; display: flex; align-items: center; justify-content: center; }
        .hex-number { position: absolute; bottom: 20px; right: 25px; font-size: 24px; font-weight: bold; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; z-index: 2; }
        
        .token { position: absolute; width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: grab; background: #555; z-index: 2; }
        #card-popup { display: none; position: fixed; background: #e6c2b8; padding: 15px; z-index: 10000; color: black; border: 2px solid #000; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="controls-wrapper">
        <div class="controls">
            <button class="btn-hex" onclick="window.addHex('town')">🏰 + Город</button>
            <button class="btn-hex" onclick="window.addHex('field')">🌱 + Поле</button>
            <button class="btn-hex" onclick="window.addHex('forest')">🌲 + Лес</button>
            <button class="btn-hex" onclick="window.addHex('bushes')">🌿 + Кусты</button>
        </div>
        <div class="controls">
            <button class="btn-inf" onclick="window.addToken('INF')">🏃 + Пехота</button>
            <button class="btn-tank" onclick="window.addToken('TNK')">🚜 + Техника</button>
            <button class="btn-air" onclick="window.addToken('AIR')">✈️ + Авиация</button>
        </div>
    </div>
    <div id="map-container"></div>
    <div id="card-popup"><input type="text" id="num-input"><button id="save-num">Сохранить</button></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onChildAdded, onChildChanged, onChildRemoved, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDwsFk9zwr-q1dxlVRrjyJNXNz9TJ0_LgA",
            authDomain: "rp-map-218d5.firebaseapp.com",
            databaseURL: "https://rp-map-218d5-default-rtdb.firebaseio.com",
            projectId: "rp-map-218d5",
            storageBucket: "rp-map-218d5.firebasestorage.app",
            messagingSenderId: "786305486724",
            appId: "1:786305486724:web:fbc318ab0864fa821897d1",
            measurementId: "G-VM0FCZX9D8"
        }; 
        const db = getDatabase(initializeApp(firebaseConfig));
        const map = document.getElementById('map-container');
        const hexImages = { town: 'assets/Город.png', field: 'assets/Равнина.png', forest: 'assets/Лес.png', bushes: 'assets/Кусты.png' };

        window.addHex = (type) => set(ref(db, 'hexes/' + Date.now()), { type, top: 100, left: 100, rotation: 0, number: "" });
        window.addToken = (type) => set(ref(db, 'tokens/' + Date.now()), { type, top: 50, left: 50 });

        function render(id, data, type) {
            const el = document.createElement('div');
            el.id = id;
            el.className = type;
            el.style.top = data.top + 'px'; el.style.left = data.left + 'px';
            
            if (type === 'hex') {
                el.style.backgroundImage = `url('${hexImages[data.type]}')`;
                el.style.transform = `rotate(${data.rotation || 0}deg)`;
                el.innerHTML = `<div class="hex-number">${data.number || ""}</div>`;
                el.ondblclick = () => update(ref(db, 'hexes/' + id), { rotation: (data.rotation || 0) + 60 });
                el.oncontextmenu = (e) => { 
                    e.preventDefault(); 
                    const popup = document.getElementById('card-popup');
                    popup.style.display = 'block'; popup.style.top = e.clientY + 'px'; popup.style.left = e.clientX + 'px';
                    document.getElementById('save-num').onclick = () => {
                        update(ref(db, 'hexes/' + id), { number: document.getElementById('num-input').value });
                        popup.style.display = 'none';
                    };
                };
            } else {
                el.innerText = {INF:'🏃', TNK:'🚜', AIR:'✈️'}[data.type];
            }

            el.onmousedown = (e) => {
                let shiftX = e.clientX - el.getBoundingClientRect().left;
                let shiftY = e.clientY - el.getBoundingClientRect().top;
                document.onmousemove = (e) => {
                    let x = e.clientX - map.getBoundingClientRect().left - shiftX;
                    let y = e.clientY - map.getBoundingClientRect().top - shiftY;
                    el.style.left = x + 'px'; el.style.top = y + 'px';
                    update(ref(db, type + 's/' + id), { top: y, left: x });
                };
                document.onmouseup = () => document.onmousemove = null;
            };
            map.appendChild(el);
        }

        onChildAdded(ref(db, 'hexes'), (s) => render(s.key, s.val(), 'hex'));
        onChildAdded(ref(db, 'tokens'), (s) => render(s.key, s.val(), 'token'));
        onChildChanged(ref(db, 'hexes'), (s) => {
            const el = document.getElementById(s.key);
            if(el) { el.style.transform = `rotate(${s.val().rotation || 0}deg)`; el.querySelector('.hex-number').innerText = s.val().number || ""; }
        });
        onChildRemoved(ref(db, 'hexes'), (s) => document.getElementById(s.key)?.remove());
        onChildRemoved(ref(db, 'tokens'), (s) => document.getElementById(s.key)?.remove());
    </script>
</body>
</html>
