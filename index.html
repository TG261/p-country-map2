<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Штаб RP</title>
    <style>
        body { font-family: Arial, sans-serif; background: #222; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .controls { margin: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; align-items: center; }
        button { padding: 10px 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; }
        .btn-inf { background: #4CAF50; color: white; }
        .btn-tank { background: #2196F3; color: white; }
        .btn-air { background: #FFC107; color: black; }
        .btn-share { background: #e91e63; color: white; }
        .file-input-label {
            background: #9c27b0;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .url-input {
            padding: 9px;
            border-radius: 5px;
            border: 1px solid #555;
            background: #333;
            color: #fff;
            width: 200px;
        }
        #map-container {
            position: relative;
            width: 1000px;
            height: 600px;
            background: #444;
            margin: 0 auto;
            border: 4px solid #555;
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }
        .token {
            position: absolute;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: move;
            user-select: none;
            font-weight: bold;
        }
        .token-inf { background: #4CAF50; }
        .token-tank { background: #2196F3; }
        .token-air { background: #FFC107; color: black; }
        .delete-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            color: white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <h1>Штаб RP</h1>
    
    <div class="controls">
        <button class="btn-inf" onclick="addToken('INF')">+ Пехота</button>
        <button class="btn-tank" onclick="addToken('TNK')">+ Танк</button>
        <button class="btn-air" onclick="addToken('AIR')">+ Авиация</button>
        
        <!-- Загрузка с ПК -->
        <label class="file-input-label">
            🗺️ Загрузить файл карты
            <input type="file" accept="image/*" style="display: none;" onchange="loadMapFromFile(this)">
        </label>

        <!-- Ввод ссылки на карту из интернета -->
        <input type="text" id="map-url-field" class="url-input" placeholder="Или вставь URL карты..." oninput="loadMapFromUrl(this.value)">

        <button class="btn-share" onclick="copyShareLink()">🔗 Ссылка для друга</button>
    </div>

    <div id="map-container"></div>

    <script>
        const map = document.getElementById('map-container');
        const urlField = document.getElementById('map-url-field');
        let tokensData = [];
        let globalMapUrl = "";

        // Восстановление состояния при открытии ссылки
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const tokensParam = urlParams.get('tokens');
            const mapParam = urlParams.get('mapUrl');
            
            if (mapParam) {
                globalMapUrl = decodeURIComponent(mapParam);
                urlField.value = globalMapUrl;
                map.style.backgroundImage = `url("${globalMapUrl}")`;
            }

            if (tokensParam) {
                try {
                    const decodedTokens = JSON.parse(decodeURIComponent(escape(atob(tokensParam))));
                    decodedTokens.forEach(t => {
                        createTokenElement(t.type, t.top, t.left);
                    });
                } catch (e) {
                    console.error("Ошибка разбора фишек:", e);
                }
            }
        };
        
        // 1. Способ загрузки: Файл с ПК
        function loadMapFromFile(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                map.style.backgroundImage = "url('" + e.target.result + "')";
                globalMapUrl = ""; 
                urlField.value = ""; // Очищаем поле ввода ссылки
            };
            reader.readAsDataURL(file);
        }

        // 2. Способ загрузки: Сетевая ссылка
        function loadMapFromUrl(url) {
            if (url.trim() !== "") {
                globalMapUrl = url.trim();
                map.style.backgroundImage = `url("${globalMapUrl}")`;
            }
        }

        function addToken(type) {
            createTokenElement(type, '50px', '50px');
        }

        function createTokenElement(type, initialTop, initialLeft) {
            const token = document.createElement('div');
            const tokenId = 'token_' + Math.random().toString(36).substr(2, 9);
            token.className = 'token token-' + type.toLowerCase();
            token.innerText = type;
            token.style.top = initialTop;
            token.style.left = initialLeft;
            token.setAttribute('data-id', tokenId);

            tokensData.push({ id: tokenId, type: type, top: initialTop, left: initialLeft });

            const del = document.createElement('div');
            del.className = 'delete-btn';
            del.innerText = 'X';
            del.onclick = function(e) {
                e.stopPropagation();
                tokensData = tokensData.filter(t => t.id !== tokenId);
                token.remove();
            };
            token.appendChild(del);

            token.onmousedown = function(e) {
                e.preventDefault();
                let shiftX = e.clientX - token.getBoundingClientRect().left;
                let shiftY = e.clientY - token.getBoundingClientRect().top;

                function moveAt(clientX, clientY) {
                    let rect = map.getBoundingClientRect();
                    let left = clientX - rect.left - shiftX;
                    let top = clientY - rect.top - shiftY;

                    left = Math.max(0, Math.min(left, rect.width - 40));
                    top = Math.max(0, Math.min(top, rect.height - 40));

                    token.style.left = left + 'px';
                    token.style.top = top + 'px';

                    const found = tokensData.find(t => t.id === tokenId);
                    if (found) {
                        found.left = left + 'px';
                        found.top = top + 'px';
                    }
                }

                function onMouseMove(e) { moveAt(e.clientX, e.clientY); }
                document.addEventListener('mousemove', onMouseMove);

                document.onmouseup = function() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.onmouseup = null;
                };
            };

            map.appendChild(token);
        }

        function copyShareLink() {
            if (tokensData.length === 0) {
                alert('Добавьте хотя бы одну фишку на карту перед тем, как делиться ссылкой.');
                return;
            }
            try {
                const jsonString = unescape(encodeURIComponent(JSON.stringify(tokensData)));
                const base64Tokens = btoa(jsonString);
                
                let queryParams = '?tokens=' + base64Tokens;
                if (globalMapUrl) {
                    queryParams += '&mapUrl=' + encodeURIComponent(globalMapUrl);
                }

                const shareUrl = window.location.origin + window.location.pathname + queryParams;
                
                navigator.clipboard.writeText(shareUrl).then(() => {
                    alert('Ссылка скопирована! Если использовалась интернет-ссылка на карту, друг сразу увидит и карту, и фишки.');
                }).catch(err => {
                    prompt('Скопируй эту ссылку вручную:', shareUrl);
                });
            } catch(e) {
                alert('Не удалось сгенерировать ссылку.');
            }
        }
    </script>
</body>
</html>
