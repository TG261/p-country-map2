<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Карта</title>
    <style>
        body { background: #222; color: #fff; text-align: center; font-family: Arial; }
        #map-container { position: relative; width: 1000px; height: 600px; background: #333; margin: 20px auto; border: 2px solid #555; }
        .token { position: absolute; width: 40px; height: 40px; border-radius: 50%; cursor: grab; background: white; border: 2px solid #000; }
    </style>
</head>
<body>
    <div id="status">Подключение...</div>
    <div id="map-container"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // СКОПИРУЙ ЭТО ИЗ FIREBASE CONSOLE (Project Settings)
        const firebaseConfig = {
            apiKey: "ТВОЙ_API_KEY",
            authDomain: "p-country-map2.firebaseapp.com",
            databaseURL: "https://p-country-map2-default-rtdb.firebaseio.com",
            projectId: "p-country-map2",
            storageBucket: "p-country-map2.appspot.com",
            messagingSenderId: "ТВОЙ_MESSAGING_SENDER_ID",
            appId: "ТВОЙ_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // Простая проверка связи
        onValue(ref(db, ".info/connected"), (snap) => {
            document.getElementById('status').innerText = snap.val() ? "🟢 Связь есть" : "🔴 Нет связи";
        });

        // (Здесь остальной твой код отрисовки, который был раньше)
    </script>
</body>
</html>
